instructions: |
  **黄金趋势分析（Gold Trend Strategy）**

  适用场景：
  - 对伦敦金 (XAUUSD) 进行独立的综合趋势分析。
  - 黄金没有 PE/PB/财报，分析核心是技术面价格行为 + 宏观驱动因子。
  - 重点关注趋势方向、关键价位以及美元/利率环境的边际变化。

  分析框架（三层结构）：

  ---

  ## 第一层：技术分析（核心权重 60%）

  ### 1.1 趋势确认（最高优先级）
  - 使用 `analyze_trend` 检查 MA5/MA10/MA20/MA50/MA200 排列状态。
  - **多头结构**：MA20 > MA50 > MA200 且 MA20 斜率向上。
  - **空头结构**：MA20 < MA50 且价格持续受压制于 MA20。
  - **盘整结构**：均线缠绕、价格在 MA20-MA50 区间内反复穿越。
  - 注意：黄金的 MA200 是极重要的牛熊分界线。

  ### 1.2 动量与节奏
  - **RSI(14)**：
    - 70+ 超买区：短期追高风险，提示等待回踩。
    - 30- 超卖区：恐慌性下跌后的修复机会。
    - 45-55 中性区：趋势方向不明时以观望为主。
    - 背离检测：价格新高而 RSI 未新高（顶背离）是强转弱信号。
  - **MACD**：
    - 零轴上方金叉：多头加速信号。
    - 零轴下方死叉：空头延续信号。
    - DIF 与 DEA 粘合：方向选择前夕，关注突破方向。
  - **ADX**（若有数据）：
    - ADX > 25 且 +DI > -DI：趋势性上涨环境。
    - ADX < 20：震荡市，减少趋势策略依赖。

  ### 1.3 波动率与位置
  - **布林带 (20,2)**：
    - 价格触及上轨 + 放量：可能突破，但通常是短期超买。
    - 价格触及下轨 + 缩量：可能阶段性底部。
    - 带宽收窄后扩张：重大方向选择（对黄金常见于重大事件前后）。
  - **乖离率**：
    - 价格偏离 MA20 超过 3% 时，提示短期不追高/不杀跌。
    - 黄金波动较大，乖离阈值可比个股稍宽（±3-5%）。

  ### 1.4 关键价位分析
  - 整数关口（如 3000、3200、3500 美元）是天然心理支撑/阻力。
  - 前高/前低是重要的技术参考位。
  - 斐波那契回撤（从最近一轮显著涨跌的起点到终点）：
    - 38.2% 回撤：强势调整位。
    - 50% 回撤：中性调整位。
    - 61.8% 回撤：弱势调整，跌破则趋势存疑。

  ---

  ## 第二层：宏观驱动因子（权重 25%）

  黄金的定价锚有三个核心维度：

  ### 2.1 美元指数 (DXY)
  - 黄金以美元计价，DXY 与金价通常呈**强负相关**。
  - 使用 `get_daily_history` 同时获取 `DX-Y.NYB` 数据做交叉对比：
    - DXY 走强 + 金价不跌：金价内在强势，有独立驱动。
    - DXY 走弱 + 金价不涨：金价内在偏弱，可能是反弹衰竭。
    - DXY 与金价同向波动：通常意味着避险情绪主导（两者同涨）或流动性危机（两者同跌）。

  ### 2.2 实际利率与 Fed 政策
  - 黄金不产生利息，实际利率（名义利率 - 通胀）是黄金持有的机会成本。
  - 关注美联储政策预期变化：
    - 降息预期升温 → 实际利率下行 → 利好黄金。
    - 加息预期升温 → 实际利率上行 → 利空黄金。
  - 若无法直接获取美债收益率数据，通过 `search_stock_news` 搜索 "Fed rate outlook gold" 获取最新政策预期。

  ### 2.3 央行购金与地缘政治
  - 全球央行持续增持黄金储备是近年结构性的重要利多因素。
  - 地缘冲突升级时黄金的避险溢价会快速上升。
  - 使用 `search_stock_news` 搜索 "central bank gold purchases" / "央行购金" / "地缘 黄金"。

  ---

  ## 第三层：新闻与情绪驱动（权重 15%）

  ### 3.1 使用 `search_stock_news` 搜索以下方向：
  - 主关键词：`"gold price outlook"` / `"XAUUSD analysis"` / `"黄金 走势"`
  - CPI/NFP 数据前后：`"gold CPI reaction"` / `"美国通胀 黄金"`
  - Fed 会议前后：`"Fed gold impact"` / `"美联储 黄金"`
  - 地缘事件：`"geopolitical risk gold"` / `"避险 黄金"`

  ### 3.2 新闻信号评估：
  - **利多信号**：央行购金加码、地缘冲突升级、通胀超预期、Fed 转向偏鸽。
  - **利空信号**：Fed 鹰派表态、美元大幅走强、风险偏好回归（股市大涨吸走资金）、
    比特币等替代资产分流避险资金。

  ---

  ## 综合评分与交易建议

  ### 评分调整建议：
  - 多头均线排列 + MA200 上升：`sentiment_score +15`
  - 顶背离（价格新高 RSI 未新高）：`sentiment_score -12`
  - DXY 走弱 + 金价同步上涨（标准负相关利多）：`sentiment_score +8`
  - 地缘政治事件升级（避险溢价）：`sentiment_score +10`
  - 价格回踩 MA50/MA200 后企稳：`sentiment_score +10`
  - 价格跌破 MA200 且三天无法收复：`sentiment_score -15`
  - Fed 超预期鹰派声明：`sentiment_score -10`
  - 金价与 DXY 同跌（流动性危机信号）：`sentiment_score -8`

  ### 交易建议输出格式：
  - **方向判断**：多头/空头/震荡，附置信度（高/中/低）。
  - **关键支撑**：近端支撑（MA20/前低）和远端支撑（MA50/MA200）。
  - **关键阻力**：近端阻力（前高/布林上轨）和远端阻力（整数关口/历史高点）。
  - **入场参考**：回踩关键支撑不破时考虑做多，需对应止损位。
  - **止损建议**：跌破近端支撑位下方 1-2%。
  - **观望条件**：均线缠绕 + ADX < 20 + 无明确宏观催化 → 明确写"暂不出手"。

  ### 定性风险排查：
  - 使用 `analyze_trend` 中的趋势强度与 MACD 状态给出明确结论。
  - 黄色/红色预警：顶背离 + 布林上轨 + RSI > 75 = 强超买警告。
  - 关注美国关键数据日历（CPI、NFP、FOMC），数据日前一天适当降低仓位建议权重。
